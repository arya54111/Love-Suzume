<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Quest 💘</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* GLOW BACKGROUND */
.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:radial-gradient(circle, rgba(255,0,150,0.4), transparent);
    filter:blur(120px);
    animation:move 6s infinite alternate;
}

@keyframes move{
    0%{transform:translate(-100px,-100px);}
    100%{transform:translate(100px,100px);}
}

/* CONTAINER */
.container{
    text-align:center;
    padding:20px;
    z-index:2;
}

/* TEXT */
.title{
    font-size:2rem;
    margin-bottom:20px;
    opacity:0;
}

.message{
    font-size:1.2rem;
    line-height:1.6;
    opacity:0;
}

/* BUTTON */
.btn{
    margin-top:40px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff0080,#7928ca);
    color:white;
    font-size:1rem;
    cursor:pointer;
    opacity:0;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <div class="title">🌌 Kuch baatein sirf dil se nikalti hain…</div>

    <div class="message" id="messageText"></div>

    <button class="btn" onclick="nextPage()">Next 💫</button>
</div>

<script>

// GET NAMES
let yourName = localStorage.getItem("yourName");
let partnerName = localStorage.getItem("partnerName");

// DYNAMIC TEXT
let text = `💖 ${partnerName}... pata hai?  
Jab se tum meri life me aaye ho, sab kuch change ho gaya hai ✨  

😌 Har choti choti cheez special lagti hai...  
Aur sabse special ho tum 💘  

${yourName} ka dil ab sirf tumhare liye dhadakta hai ❤️`;

document.getElementById("messageText").innerText = text;


// ANIMATION
gsap.to(".title", {
    opacity:1,
    y:-20,
    duration:1.5,
    ease:"power3.out"
});

gsap.to(".message", {
    opacity:1,
    y:-10,
    delay:0.7,
    duration:2,
    ease:"power2.out"
});

gsap.to(".btn", {
    opacity:1,
    scale:1.1,
    delay:1.5,
    duration:1,
    ease:"back.out(1.7)"
});


// NEXT PAGE
function nextPage(){
    window.location.href = "LSuzume4.html";
}

</script>

</body>
</html>
