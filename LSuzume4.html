<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Quest 😏</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* TEXT */
.title{
    font-size:2rem;
    margin-bottom:20px;
    opacity:0;
}

.subtitle{
    font-size:1.2rem;
    margin-bottom:20px;
    opacity:0;
}

/* GIF */
.gif{
    width:160px;
    margin:15px auto;
    opacity:0;
}

/* OPTIONS */
.options{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:20px;
}

.option-btn{
    padding:12px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4e8a;
    font-size:1rem;
    cursor:pointer;
    opacity:0;
    transition:0.3s;
}

.option-btn:hover{
    transform:scale(1.08);
}

/* RESULT */
.result{
    margin-top:20px;
    font-size:1.2rem;
    min-height:40px;
    opacity:0;
}

/* NEXT BUTTON */
.next-btn{
    margin-top:25px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:#fff;
    color:#ff4e8a;
    cursor:pointer;
    opacity:0;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">😏 Ek honest sawaal…</div>
    <div class="subtitle">Tum mujhe kitna love karte ho? 💘</div>

    <img src="cute2.gif" class="gif">

    <div class="options">
        <button class="option-btn" onclick="selectOption(1)">😎 Thoda sa</button>
        <button class="option-btn" onclick="selectOption(2)">❤️ Bohot zyada</button>
        <button class="option-btn" onclick="selectOption(3)">🔥 Pagalon jaisa</button>
    </div>

    <div class="result" id="resultText"></div>

    <button class="next-btn" id="nextBtn" onclick="nextPage()">Next 💫</button>

</div>

<script>

// ANIMATIONS
gsap.to(".title",{opacity:1,y:-20,duration:1.2});
gsap.to(".subtitle",{opacity:1,y:-10,delay:0.3,duration:1.2});
gsap.to(".gif",{opacity:1,scale:1.1,delay:0.6,duration:1});
gsap.to(".option-btn",{opacity:1,y:-10,delay:1,duration:1,stagger:0.2});


// OPTION LOGIC
function selectOption(choice){
    let result = document.getElementById("resultText");
    let nextBtn = document.getElementById("nextBtn");

    if(choice === 1){
        result.innerText = "😏 Sirf thoda sa? Mujhe aur expect tha tumse!";
    }
    else if(choice === 2){
        result.innerText = "😍 Awww… ye hui na baat! Dil khush kar diya 💖";
    }
    else{
        result.innerText = "🔥 Bas! Yehi sunna tha… tum officially obsessed ho 💘";
    }

    // Show result + next button
    gsap.to(".result",{opacity:1,y:-5,duration:0.5});
    gsap.to(".next-btn",{opacity:1,scale:1.1,delay:0.3,duration:0.8});
}


// NEXT PAGE
function nextPage(){
    window.location.href = "LSuzume5.html";
}

</script>

</body>
</html>
