<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Cards 💌</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fecfef);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    text-align:center;
}

/* CONTAINER */
.container{
    width:100%;
}

/* TITLE */
.title{
    font-size:2rem;
    margin-bottom:20px;
    opacity:0;
}

/* GIF */
.gif{
    width:150px;
    margin:10px auto;
    opacity:0;
}

/* SLIDER */
.slider{
    display:flex;
    overflow:hidden;
    width:300px;
    margin:20px auto;
}

.card{
    min-width:300px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    font-size:1.2rem;
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4e8a;
    cursor:pointer;
    opacity:0;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">💌 Kuch special baatein… sirf tumhare liye</div>

    <img src="cute6.gif" class="gif">

    <div class="slider" id="slider">

        <div class="card">💖 Tum meri life ka sabse beautiful part ho ✨</div>

        <div class="card">😍 Tumhare bina sab kuch adhura lagta hai…</div>

        <div class="card">🥺 Jab tum paas hote ho to sab perfect lagta hai</div>

        <div class="card">❤️ I don’t need anything… bas tum chahiye</div>

    </div>

    <button class="btn" onclick="nextPage()">Next 💫</button>

</div>

<script>

// ANIMATION
gsap.to(".title",{opacity:1,y:-20,duration:1.2});
gsap.to(".gif",{opacity:1,scale:1.1,delay:0.4,duration:1});

// SLIDER ANIMATION
let slider = document.getElementById("slider");
let index = 0;

setInterval(()=>{
    index++;
    if(index > 3) index = 0;

    gsap.to(slider,{
        x: -300 * index,
        duration:1,
        ease:"power2.inOut"
    });
}, 2500);


// BUTTON SHOW
gsap.to(".btn",{opacity:1,scale:1.1,delay:2,duration:1});


// NEXT PAGE
function nextPage(){
    window.location.href = "LSuzume6.html";
}

</script>

</body>
</html>
